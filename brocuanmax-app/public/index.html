<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brocuanmax</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0E14;
            color: #e2e8f0;
            margin: 0;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0B0E14;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        .glass-panel {
            background: rgba(20, 25, 35, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(90deg, #F59E0B, #FCD34D);
        }

        .btn-magnific {
            background: linear-gradient(135deg, #D97706 0%, #F59E0B 100%);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-magnific:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.5);
        }

        .btn-magnific:disabled {
            background: #334155;
            color: #94a3b8;
            cursor: not-allowed;
        }
    </style>

    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 500: '#F59E0B', 600: '#D97706' }, dark: { 800: '#1e293b', 900: '#0B0E14' } } } } }
    </script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const FileUploader = ({ label, icon, accept, file, setFile, type, description }) => {
            const fileInputRef = useRef(null);
            const [preview, setPreview] = useState(null);

            useEffect(() => {
                if (!file) { setPreview(null); return; }
                const objectUrl = URL.createObjectURL(file);
                setPreview(objectUrl);
                return () => URL.revokeObjectURL(objectUrl);
            }, [file]);

            return (
                <div className="flex flex-col gap-2">
                    <label className="text-sm font-semibold text-gray-300 flex justify-between">
                        <span>{label}</span>
                        {file && (<button onClick={(e) => { e.stopPropagation(); setFile(null); }} className="text-red-400 hover:text-red-300 text-xs"> <i className="fa-solid fa-times mr-1"></i>Hapus </button>)}
                    </label>
                    <div onClick={() => !file && fileInputRef.current.click()} className={`relative w-full h-48 border-2 border-dashed rounded-xl flex justify-center items-center overflow-hidden transition-all ${file ? 'border-gray-600 bg-black' : 'border-gray-700 hover:border-brand-500 bg-dark-800/40 cursor-pointer group'}`}>
                        <input type="file" accept={accept} ref={fileInputRef} onChange={(e) => e.target.files[0] && setFile(e.target.files[0])} className="hidden" />
                        {preview ? (type === 'image' ? (<img src={preview} alt="Preview" className="w-full h-full object-contain" />) : (<video src={preview} controls className="w-full h-full object-contain" />)) : (
                            <div className="text-center p-4">
                                <div className="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center mx-auto mb-3 text-gray-400 group-hover:text-brand-500"><i className={`fa-solid ${icon} text-xl`}></i></div>
                                <p className="text-sm text-gray-300 font-medium">Klik untuk Unggah</p>
                                <p className="text-xs text-gray-500 mt-1">{description}</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('magnific_api_key') || "");
            const [characterImg, setCharacterImg] = useState(null);
            const [referenceVideo, setReferenceVideo] = useState(null);
            const [activeTab, setActiveTab] = useState('generate');
            const [errorMessage, setErrorMessage] = useState("");
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [statusText, setStatusText] = useState("");
            const [resultUrl, setResultUrl] = useState(null);

            const handleSaveApiKey = (key) => { setApiKey(key); localStorage.setItem('magnific_api_key', key); };

            const fileToBase64 = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                });
            };

            const handleGenerate = async () => {
                setErrorMessage("");
                if (!apiKey) { setErrorMessage("API Key Magnific tidak ditemukan."); setActiveTab('settings'); return; }
                if (!characterImg || !referenceVideo) { setErrorMessage("Gambar Karakter dan Video Referensi wajib diunggah."); return; }

                setIsProcessing(true); setProgress(10); setStatusText("Menyiapkan aset media..."); setResultUrl(null);

                try {
                    const base64Image = await fileToBase64(characterImg);
                    const base64Video = await fileToBase64(referenceVideo);

                    setProgress(30); setStatusText("Mengirim tugas ke Vercel...");

                    // --- PERUBAHAN: Menembak Backend Lokal Vercel (/api/generate) ---
                    const createRes = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            apiKey: apiKey, // Kirim API key user di payload
                            image: base64Image,
                            reference_video: base64Video
                        })
                    });

                    if (!createRes.ok) {
                        const errData = await createRes.json();
                        throw new Error(`Gagal membuat tugas: ${errData.error || createRes.statusText}`);
                    }

                    const createData = await createRes.json();
                    const taskId = createData.data?.task_id || createData.task_id;
                    if (!taskId) throw new Error("Task ID tidak ditemukan.");

                    setProgress(45); setStatusText("Memproses Video...");

                    // --- PERUBAHAN: Menembak Backend Lokal Vercel (/api/status) ---
                    const checkStatus = async () => {
                        try {
                            const statusRes = await fetch(`/api/status?taskId=${taskId}`, {
                                headers: { 'x-magnific-api-key': apiKey }
                            });

                            if (!statusRes.ok) throw new Error("Gagal mengambil status tugas.");
                            const statusData = await statusRes.json();
                            const currentStatus = statusData.data?.status || statusData.status;

                            if (currentStatus === 'COMPLETED' || currentStatus === 'SUCCESS') {
                                setProgress(100); setStatusText("Render Selesai!");
                                setResultUrl(statusData.data?.result_url || statusData.data?.video_url || statusData.result_url);
                                setIsProcessing(false);
                            } else if (currentStatus === 'FAILED' || currentStatus === 'ERROR') {
                                throw new Error("Proses AI Gagal. Coba file referensi yang berbeda.");
                            } else {
                                setProgress(prev => (prev < 95 ? prev + 2 : 95));
                                setTimeout(checkStatus, 5000);
                            }
                        } catch (err) {
                            setErrorMessage(err.message); setIsProcessing(false);
                        }
                    };
                    setTimeout(checkStatus, 5000);

                } catch (error) {
                    setErrorMessage(error.message); setIsProcessing(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="glass-panel px-8 py-4 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-bold text-gradient">Brocuanmax</h1>
                            <div className="flex gap-2">
                                <button onClick={() => setActiveTab('generate')} className={`px-4 py-2 rounded-md text-sm font-medium ${activeTab === 'generate' ? 'bg-brand-500 text-white' : 'text-gray-400 hover:text-white'}`}>Workspace</button>
                                <button onClick={() => setActiveTab('settings')} className={`px-4 py-2 rounded-md text-sm font-medium ${activeTab === 'settings' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:text-white'}`}>Settings</button>
                            </div>
                        </div>
                    </nav>

                    <main className="p-6 md:p-8 flex justify-center w-full">
                        <div className="max-w-7xl w-full">
                            {activeTab === 'settings' && (
                                <div className="max-w-2xl mx-auto glass-panel p-8 rounded-2xl">
                                    <h2 className="text-xl font-bold text-white mb-4">API Configuration</h2>
                                    <input type="password" value={apiKey} onChange={(e) => handleSaveApiKey(e.target.value)} placeholder="Masukkan API Key Magnific" className="w-full bg-dark-900 border border-gray-700 rounded-xl p-4 text-white mb-4 focus:outline-none focus:border-brand-500" />
                                    <button onClick={() => setActiveTab('generate')} className="bg-gray-800 hover:bg-gray-700 text-white py-3 px-6 rounded-xl font-semibold">Simpan & Kembali</button>
                                </div>
                            )}

                            {activeTab === 'generate' && (
                                <div className="flex flex-col lg:flex-row gap-8">
                                    <div className="w-full lg:w-5/12 flex flex-col gap-6">
                                        {errorMessage && (<div className="bg-red-500/10 border border-red-500/50 text-red-200 p-4 rounded-xl text-sm">{errorMessage}</div>)}
                                        <div className="glass-panel p-6 rounded-2xl flex flex-col gap-6">
                                            <FileUploader label="1. Karakter (Image)" icon="fa-user" accept="image/png, image/jpeg" file={characterImg} setFile={setCharacterImg} type="image" description="Max 5MB" />
                                            <FileUploader label="2. Referensi (Video)" icon="fa-video" accept="video/mp4" file={referenceVideo} setFile={setReferenceVideo} type="video" description="Max 5MB" />
                                        </div>
                                        <button onClick={handleGenerate} disabled={isProcessing} className="btn-magnific w-full py-4 rounded-xl font-bold">
                                            {isProcessing ? `Memproses ${progress}%` : "Generate Motion"}
                                        </button>
                                    </div>
                                    <div className="w-full lg:w-7/12 glass-panel rounded-2xl min-h-[500px] bg-black/40 flex items-center justify-center p-4">
                                        {!isProcessing && !resultUrl && <p className="text-gray-500">Preview Area</p>}
                                        {isProcessing && <p className="text-brand-500 animate-pulse">{statusText}</p>}
                                        {resultUrl && !isProcessing && <video src={resultUrl} controls autoPlay loop className="w-full h-full object-contain rounded-xl" />}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
